asyncapi: '3.0.0'
info:
  title: Summary Capital Check V3
  version: '1.0.0'
  summary: summary without capital letter.  # Noncompliant {{Summaries must start with a capital letter and end with a period.}}

channels:
  userCreated:
    address: user/created
    messages:
      validMsg:
        name: validMsg
        summary: Valid message summary.
        payload:
          type: object
      invalidMsg:
        name: invalidMsg
        summary: invalid message - no capital letter  # Noncompliant {{Summaries must start with a capital letter and end with a period.}}
        payload:
          type: object

operations:
  onUserCreated:
    action: receive
    channel:
      $ref: '#/channels/userCreated'
    summary: Subscribe to user creation events.
    message:
      $ref: '#/channels/userCreated/messages/validMsg'
  publishUserEvent:
    action: send
    channel:
      $ref: '#/channels/userCreated'
    summary: bad operation summary missing period  # Noncompliant {{Summaries must start with a capital letter and end with a period.}}
    message:
      $ref: '#/channels/userCreated/messages/invalidMsg'
