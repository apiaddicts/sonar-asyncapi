asyncapi: "3.1.0"
info:
  title: Minimal API
  version: 1.0.0

channels:
  userCreated:
    address: user/created
    messages:
      userCreatedMessage:
        payload:
          type: object

operations:
  onUserCreated:
    action: receive
    channel:
      $ref: '#/channels/userCreated'
    operationId: onUserCreated
    message:
      $ref: '#/channels/userCreated/messages/userCreatedMessage'
